name: typecheck

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, dev]

jobs:
  checks:
    name: Lint, Typecheck, Tests
    if: ${{ github.actor != 'github-actions' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      HUSKY: 0

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup latest Node.js 24.x
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38  # v6
        with:
          node-version: 24
          check-latest: true

      - name: Setup pnpm
        run: |
          corepack enable
          corepack install
          echo "pnpm version: $(pnpm -v)"
          node -e "const v=require('child_process').execSync('pnpm -v').toString().trim(); if(!/^11\\./.test(v)){console.error('Expected pnpm 11.x, got', v); process.exit(1);} console.log('pnpm 11 OK');"

      - name: Resolve pnpm store path
        id: pnpm_store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25  # v5
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-x64-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-x64-

      - name: Install dependencies from lockfile
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run Biome checks
        run: pnpm run lint:check

      - name: Run TypeScript type-check
        run: pnpm run typecheck

      - name: Test + coverage (main)
        run: |
          echo "# Main" >> "$GITHUB_STEP_SUMMARY"
          pnpm run coverage:main

      - name: Test + coverage (renderer)
        run: |
          echo "# Renderer" >> "$GITHUB_STEP_SUMMARY"
          pnpm run coverage:renderer

      - name: Update coverage badges
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          read_pct() {
            node -e 'const fs=require("fs");try{const j=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));const p=Number(j?.total?.lines?.pct);process.stdout.write(Number.isFinite(p)?p.toFixed(2)+"%":"0.00%")}catch{process.stdout.write("0.00%")}' "$1"
          }
          MAIN_COVERAGE=$(read_pct coverage/main/coverage-summary.json)
          RENDERER_COVERAGE=$(read_pct coverage/renderer/coverage-summary.json)

          coverage_color() {
            local v="${1%%%}"
            [[ "$v" =~ ^[0-9]+([.][0-9]+)?$ ]] || { echo lightgrey; return; }
            awk -v v="$v" 'BEGIN{ if(v>=80)print"success"; else if(v>=60)print"yellow"; else if(v>=40)print"orange"; else print"red" }'
          }

          rm -rf temp-badges && mkdir temp-badges && cd temp-badges
          git clone --depth=1 --branch version "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}" .
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          mkdir -p .github/badges

          echo "{\"schemaVersion\":1,\"label\":\"coverage main\",\"message\":\"${MAIN_COVERAGE}\",\"color\":\"$(coverage_color "$MAIN_COVERAGE")\"}" > ".github/badges/${BRANCH_NAME}-coverage-main.json"
          echo "{\"schemaVersion\":1,\"label\":\"coverage renderer\",\"message\":\"${RENDERER_COVERAGE}\",\"color\":\"$(coverage_color "$RENDERER_COVERAGE")\"}" > ".github/badges/${BRANCH_NAME}-coverage-renderer.json"

          # dev publishes a main alias before main's first coverage run (mirrors the badges action)
          if [ "${BRANCH_NAME}" = "dev" ]; then
            [ -f .github/badges/main-coverage-main.json ] || cp ".github/badges/${BRANCH_NAME}-coverage-main.json" .github/badges/main-coverage-main.json
            [ -f .github/badges/main-coverage-renderer.json ] || cp ".github/badges/${BRANCH_NAME}-coverage-renderer.json" .github/badges/main-coverage-renderer.json
          fi

          git add .github/badges/*-coverage-*.json
          git commit -m "chore(badges): ${BRANCH_NAME} coverage main ${MAIN_COVERAGE}, renderer ${RENDERER_COVERAGE}" || { echo "No changes"; exit 0; }
          git push
