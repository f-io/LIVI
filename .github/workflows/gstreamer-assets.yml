name: gstreamer assets
run-name: 'gstreamer-assets → ${{ github.ref_name }}'

on:
  workflow_dispatch:
    inputs:
      macos_arm64:
        description: 'Build macOS arm64 bundle'
        type: boolean
        default: true
      linux_x64:
        description: 'Build Linux x64 bundle'
        type: boolean
        default: true
      linux_arm64:
        description: 'Build Linux arm64 bundle'
        type: boolean
        default: true
      windows_x64:
        description: 'Build Windows x64 bundle'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  plan:
    name: Plan asset matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      is_empty: ${{ steps.plan.outputs.is_empty }}

    steps:
      - id: plan
        shell: bash
        env:
          IN_MACOS_ARM64: ${{ inputs.macos_arm64 }}
          IN_LINUX_X64: ${{ inputs.linux_x64 }}
          IN_LINUX_ARM64: ${{ inputs.linux_arm64 }}
          IN_WINDOWS_X64: ${{ inputs.windows_x64 }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('fs');

          const isTrue = (v) => String(v).toLowerCase() === 'true';

          const inputs = {
            macos_arm64: isTrue(process.env.IN_MACOS_ARM64),
            linux_x64: isTrue(process.env.IN_LINUX_X64),
            linux_arm64: isTrue(process.env.IN_LINUX_ARM64),
            windows_x64: isTrue(process.env.IN_WINDOWS_X64),
          };

          const include = [];
          const add = (os, runner, arch, dir_name, artifact_name, archive_name) => {
            include.push({ os, runner, arch, dir_name, artifact_name, archive_name });
          };

          if (inputs.macos_arm64) {
            add(
              'macos',
              'macos-latest',
              'arm64',
              'macos-arm64',
              'gstreamer-macos-arm64',
              'gstreamer-macos-arm64.tar.gz'
            );
          }

          if (inputs.linux_x64) {
            add(
              'linux',
              'ubuntu-24.04',
              'x64',
              'linux-x64',
              'gstreamer-linux-x64',
              'gstreamer-linux-x64.tar.gz'
            );
          }

          if (inputs.linux_arm64) {
            add(
              'linux',
              'ubuntu-24.04-arm',
              'arm64',
              'linux-arm64',
              'gstreamer-linux-arm64',
              'gstreamer-linux-arm64.tar.gz'
            );
          }

          if (inputs.windows_x64) {
            add(
              'windows',
              'windows-latest',
              'x64',
              'windows-x64',
              'gstreamer-windows-x64',
              ''
            );
          }

          const matrixObj = { include };
          const matrix = JSON.stringify(matrixObj);
          const isEmpty = include.length === 0 ? 'true' : 'false';

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${matrix}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `is_empty=${isEmpty}\n`);

          console.log('Planned matrix:', matrix);
          console.log('Empty:', isEmpty);
          NODE

  build:
    name: Build assets (${{ matrix.os }}-${{ matrix.arch }})
    needs: plan
    if: ${{ needs.plan.outputs.is_empty != 'true' }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      # ----------------------------
      # macOS arm64
      # ----------------------------
      - name: Download GStreamer runtime pkg [macos-arm64]
        if: matrix.os == 'macos' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          curl -fL \
            -o gstreamer-runtime.pkg \
            https://gstreamer.freedesktop.org/data/pkg/osx/1.28.1/gstreamer-1.0-1.28.1-universal.pkg

      - name: Install GStreamer runtime pkg [macos-arm64]
        if: matrix.os == 'macos' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          sudo installer -pkg gstreamer-runtime.pkg -target /

      - name: Build bundle [macos-arm64]
        if: matrix.os == 'macos' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/gstreamer/package-macos.sh
          scripts/gstreamer/package-macos.sh "assets/gstreamer/${{ matrix.dir_name }}"

      - name: Smoke test bundle [macos-arm64]
        if: matrix.os == 'macos' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/gstreamer/smoke-test-macos.sh
          scripts/gstreamer/smoke-test-macos.sh "assets/gstreamer/${{ matrix.dir_name }}"

      - name: Write version file [macos-arm64]
        if: matrix.os == 'macos' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$("assets/gstreamer/${{ matrix.dir_name }}/bin/gst-launch-1.0" --version | awk '/^gst-launch-1.0 version / { print $3; exit }')"
          printf '%s\n' "$VERSION" > "assets/gstreamer/${{ matrix.dir_name }}/version.txt"
          echo "Version: $VERSION"

      - name: Pack artifact [macos-arm64]
        if: matrix.os == 'macos' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          tar -C assets/gstreamer -czf "${{ matrix.archive_name }}" "${{ matrix.dir_name }}"

      - name: Upload artifact [macos-arm64]
        if: matrix.os == 'macos' && matrix.arch == 'arm64'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}
          retention-days: 7

      # ----------------------------
      # Linux x64
      # ----------------------------
      - name: Build bundle [linux-x64 via Debian forky]
        if: matrix.os == 'linux' && matrix.arch == 'x64'
        shell: bash
        run: |
          set -euo pipefail

          chmod +x scripts/gstreamer/package-linux.sh
          chmod +x scripts/gstreamer/smoke-test-linux.sh

          docker run --rm --platform=linux/amd64 \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            debian:forky-slim sh -lc '
              set -euo pipefail

              export DEBIAN_FRONTEND=noninteractive

              apt-get update
              apt-get install -y --no-install-recommends \
                bash coreutils findutils file python3 dpkg-dev ca-certificates \
                gstreamer1.0-tools \
                gstreamer1.0-plugins-base \
                gstreamer1.0-plugins-good \
                gstreamer1.0-plugins-bad \
                gstreamer1.0-libav \
                gstreamer1.0-gl \
                gstreamer1.0-x \
                gstreamer1.0-alsa \
                gstreamer1.0-pulseaudio \
                libgstreamer1.0-0 \
                libgstreamer-plugins-base1.0-0 \
                libglib2.0-0 \
                liborc-0.4-0 \
                libgudev-1.0-0 \
                zlib1g \
                libc6 \
                libgcc-s1 \
                libstdc++6

              scripts/gstreamer/package-linux.sh "assets/gstreamer/linux-x64"
              scripts/gstreamer/smoke-test-linux.sh "assets/gstreamer/linux-x64"

              VERSION="$(assets/gstreamer/linux-x64/bin/gst-launch-1.0 --version | awk '"'"'/^gst-launch-1.0 version / { print $3; exit }'"'"')"
              printf "%s\n" "$VERSION" > assets/gstreamer/linux-x64/version.txt
              echo "Version: $VERSION"
            '

      - name: Fix file permissions [linux-x64]
        if: matrix.os == 'linux' && matrix.arch == 'x64'
        shell: bash
        run: |
          set -euo pipefail
          sudo chown -R "$USER:$USER" "assets/gstreamer/${{ matrix.dir_name }}" 2>/dev/null || true
          sudo chmod -R a+rX "assets/gstreamer/${{ matrix.dir_name }}" 2>/dev/null || true

      - name: Pack artifact [linux-x64]
        if: matrix.os == 'linux' && matrix.arch == 'x64'
        shell: bash
        run: |
          set -euo pipefail
          tar -C assets/gstreamer -czf "${{ matrix.archive_name }}" "${{ matrix.dir_name }}"

      - name: Upload artifact [linux-x64]
        if: matrix.os == 'linux' && matrix.arch == 'x64'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}
          retention-days: 7

      # ----------------------------
      # Linux arm64
      # ----------------------------
      - name: Build bundle [linux-arm64 via Debian forky]
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail

          chmod +x scripts/gstreamer/package-linux.sh
          chmod +x scripts/gstreamer/smoke-test-linux.sh

          docker run --rm --platform=linux/arm64/v8 \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            debian:forky-slim sh -lc '
              set -euo pipefail

              export DEBIAN_FRONTEND=noninteractive

              apt-get update
              apt-get install -y --no-install-recommends \
                bash coreutils findutils file python3 dpkg-dev ca-certificates \
                gstreamer1.0-tools \
                gstreamer1.0-plugins-base \
                gstreamer1.0-plugins-good \
                gstreamer1.0-plugins-bad \
                gstreamer1.0-libav \
                gstreamer1.0-gl \
                gstreamer1.0-x \
                gstreamer1.0-alsa \
                gstreamer1.0-pulseaudio \
                libgstreamer1.0-0 \
                libgstreamer-plugins-base1.0-0 \
                libglib2.0-0 \
                liborc-0.4-0 \
                libgudev-1.0-0 \
                zlib1g \
                libc6 \
                libgcc-s1 \
                libstdc++6

              scripts/gstreamer/package-linux.sh "assets/gstreamer/linux-arm64"
              scripts/gstreamer/smoke-test-linux.sh "assets/gstreamer/linux-arm64"

              VERSION="$(assets/gstreamer/linux-arm64/bin/gst-launch-1.0 --version | awk '"'"'/^gst-launch-1.0 version / { print $3; exit }'"'"')"
              printf "%s\n" "$VERSION" > assets/gstreamer/linux-arm64/version.txt
              echo "Version: $VERSION"
            '

      - name: Fix file permissions [linux-arm64]
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          sudo chown -R "$USER:$USER" "assets/gstreamer/${{ matrix.dir_name }}" 2>/dev/null || true
          sudo chmod -R a+rX "assets/gstreamer/${{ matrix.dir_name }}" 2>/dev/null || true

      - name: Pack artifact [linux-arm64]
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          tar -C assets/gstreamer -czf "${{ matrix.archive_name }}" "${{ matrix.dir_name }}"

      - name: Upload artifact [linux-arm64]
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}
          retention-days: 7

      # ----------------------------
      # Windows x64
      # ----------------------------
      - name: Download GStreamer runtime installer [windows-x64]
        if: matrix.os == 'windows' && matrix.arch == 'x64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          curl.exe -L 'https://gstreamer.freedesktop.org/data/pkg/windows/1.28.1/msvc/gstreamer-1.0-msvc-x86_64-1.28.1.exe' -o 'gstreamer-runtime-x86_64.exe'

      - name: Install GStreamer runtime [windows-x64]
        if: matrix.os == 'windows' && matrix.arch == 'x64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $p = Start-Process `
            -FilePath '.\gstreamer-runtime-x86_64.exe' `
            -ArgumentList @('/SP-', '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART') `
            -PassThru

          if (-not $p.WaitForExit(180000)) {
            try { $p.Kill() } catch {}
            throw 'GStreamer installer timed out after 3 minutes'
          }

          if ($p.ExitCode -ne 0) {
            throw "GStreamer installer failed with exit code $($p.ExitCode)"
          }

      - name: Build bundle [windows-x64]
        if: matrix.os == 'windows' && matrix.arch == 'x64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/gstreamer/package-windows.ps1 "assets/gstreamer/${{ matrix.dir_name }}"

      - name: Smoke test bundle [windows-x64]
        if: matrix.os == 'windows' && matrix.arch == 'x64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/gstreamer/smoke-test-windows.ps1 "assets/gstreamer/${{ matrix.dir_name }}"

      - name: Write version file [windows-x64]
        if: matrix.os == 'windows' && matrix.arch == 'x64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $versionLine = & "assets/gstreamer/${{ matrix.dir_name }}/bin/gst-launch-1.0.exe" --version |
            Select-String '^gst-launch-1.0 version ' |
            Select-Object -First 1

          if (-not $versionLine) {
            throw 'Could not determine GStreamer version'
          }

          $parts = $versionLine.ToString() -split '\s+'
          if ($parts.Length -lt 3) {
            throw "Unexpected version output: $versionLine"
          }

          $version = $parts[2]
          Set-Content -Path "assets/gstreamer/${{ matrix.dir_name }}/version.txt" -Value $version -NoNewline
          Write-Host "Version: $version"

      - name: Upload artifact [windows-x64]
        if: matrix.os == 'windows' && matrix.arch == 'x64'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: assets/gstreamer/${{ matrix.dir_name }}
          retention-days: 7

  publish:
    name: Publish gstreamer assets
    needs:
      - plan
      - build
    if: ${{ needs.plan.outputs.is_empty != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Download artifact [macos-arm64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-macos-arm64"')
        uses: actions/download-artifact@v8
        with:
          name: gstreamer-macos-arm64
          path: .artifacts/macos-arm64

      - name: Extract artifact [macos-arm64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-macos-arm64"')
        shell: bash
        run: |
          set -euo pipefail
          rm -rf assets/gstreamer/macos-arm64
          mkdir -p assets/gstreamer
          tar -C assets/gstreamer -xzf .artifacts/macos-arm64/gstreamer-macos-arm64.tar.gz

      - name: Download artifact [linux-x64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-linux-x64"')
        uses: actions/download-artifact@v8
        with:
          name: gstreamer-linux-x64
          path: .artifacts/linux-x64

      - name: Extract artifact [linux-x64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-linux-x64"')
        shell: bash
        run: |
          set -euo pipefail
          rm -rf assets/gstreamer/linux-x64
          mkdir -p assets/gstreamer
          tar -C assets/gstreamer -xzf .artifacts/linux-x64/gstreamer-linux-x64.tar.gz

      - name: Download artifact [linux-arm64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-linux-arm64"')
        uses: actions/download-artifact@v8
        with:
          name: gstreamer-linux-arm64
          path: .artifacts/linux-arm64

      - name: Extract artifact [linux-arm64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-linux-arm64"')
        shell: bash
        run: |
          set -euo pipefail
          rm -rf assets/gstreamer/linux-arm64
          mkdir -p assets/gstreamer
          tar -C assets/gstreamer -xzf .artifacts/linux-arm64/gstreamer-linux-arm64.tar.gz

      - name: Prepare target dir [windows-x64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-windows-x64"')
        shell: bash
        run: |
          set -euo pipefail
          rm -rf assets/gstreamer/windows-x64
          mkdir -p assets/gstreamer

      - name: Download artifact [windows-x64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-windows-x64"')
        uses: actions/download-artifact@v8
        with:
          name: gstreamer-windows-x64
          path: .artifacts/windows-x64

      - name: Copy artifact into repo [windows-x64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-windows-x64"')
        shell: bash
        run: |
          set -euo pipefail
          cp -a .artifacts/windows-x64 assets/gstreamer/windows-x64

      - name: Read published version
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION=""
          if [[ -f assets/gstreamer/macos-arm64/version.txt ]]; then
            VERSION="$(cat assets/gstreamer/macos-arm64/version.txt)"
          elif [[ -f assets/gstreamer/linux-x64/version.txt ]]; then
            VERSION="$(cat assets/gstreamer/linux-x64/version.txt)"
          elif [[ -f assets/gstreamer/linux-arm64/version.txt ]]; then
            VERSION="$(cat assets/gstreamer/linux-arm64/version.txt)"
          elif [[ -f assets/gstreamer/windows-x64/version.txt ]]; then
            VERSION="$(cat assets/gstreamer/windows-x64/version.txt)"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push assets
        id: commit_assets
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f -A assets/gstreamer

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No asset changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "${{ steps.meta.outputs.version }}" ]]; then
            git commit -m "chore(gstreamer): update bundled assets to ${{ steps.meta.outputs.version }}"
          else
            git commit -m "chore(gstreamer): update bundled assets"
          fi

          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push gstreamer badge
        if: steps.commit_assets.outputs.changed == 'true' && steps.meta.outputs.version != '' && (github.ref_name == 'main' || github.ref_name == 'dev')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          GSTREAMER_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          BADGE_DIR="$(mktemp -d)"
          cd "$BADGE_DIR"

          git clone --depth=1 --branch version "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}" .

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mkdir -p .github/badges
          echo "{\"schemaVersion\":1,\"label\":\"gstreamer\",\"message\":\"${GSTREAMER_VERSION}\",\"color\":\"blue\"}" > ".github/badges/${BRANCH_NAME}-gstreamer.json"

          git add ".github/badges/${BRANCH_NAME}-gstreamer.json"

          if [[ -z "$(git status --porcelain -- ".github/badges/${BRANCH_NAME}-gstreamer.json")" ]]; then
            echo "No badge changes"
            exit 0
          fi

          git commit -m "chore(badges): ${BRANCH_NAME} -> gstreamer ${GSTREAMER_VERSION}"
          git push
