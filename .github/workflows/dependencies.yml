name: dependencies
run-name: 'dependencies → ${{ github.event_name == ''workflow_dispatch'' && (inputs.include_major && ''major'' || ''minor+patch'') || ''minor+patch'' }} on ${{ github.event_name == ''workflow_dispatch'' && inputs.branch || ''dev'' }}'

on:
  schedule:
   - cron: '0 20 * * 0'

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update'
        required: true
        default: 'dev'
        type: string
      include_major:
        description: 'Include major updates'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update dependencies on ${{ github.event_name == 'workflow_dispatch' && inputs.branch || 'dev' }}
    runs-on: ubuntu-latest

    env:
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || 'dev' }}
      HUSKY: 0

    steps:
      - name: Checkout target branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_BRANCH }}

      - name: Setup Node + pnpm
        id: pnpm
        uses: ./.github/actions/pnpm
        with:
          node-version: '24'
          pnpm-major: '11'
          pnpm-store-dir: '.pnpm-store'

      - name: Collect available updates report
        id: report
        shell: bash
        run: |
          set -euo pipefail

          REPORT="$(npx --yes npm-check-updates --format group || true)"

          {
            echo 'report<<EOF'
            echo "$REPORT"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update minor and patch only
        if: ${{ github.event_name == 'schedule' || inputs.include_major == false }}
        run: npx --yes npm-check-updates -u --target minor

      - name: Update including majors
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.include_major == true }}
        run: npx --yes npm-check-updates -u

      - name: Check whether package.json changed
        id: manifest_changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- package.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh lockfile
        if: steps.manifest_changes.outputs.changed == 'true'
        run: pnpm install --lockfile-only --ignore-scripts

      - name: Check for dependency file changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- package.json pnpm-lock.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute PR metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.include_major }}" == "true" ]]; then
            echo "branch=chore/deps-major" >> "$GITHUB_OUTPUT"
            echo "title=chore(deps): update dependencies (major)" >> "$GITHUB_OUTPUT"
          else
            echo "branch=chore/deps-minor" >> "$GITHUB_OUTPUT"
            echo "title=chore(deps): update dependencies" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update the pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.meta.outputs.branch }}
          TITLE: ${{ steps.meta.outputs.title }}
          REPORT: ${{ steps.report.outputs.report }}
          INCLUDE_MAJOR: ${{ github.event_name == 'workflow_dispatch' && inputs.include_major || false }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # Written line by line because the report may carry backticks, which a
          # heredoc would run as command substitution.
          BODY_FILE="$(mktemp)"
          {
            echo 'Automated dependency update.'
            echo
            echo "Target branch: \`${TARGET_BRANCH}\`"
            echo "Include major updates: \`${INCLUDE_MAJOR}\`"
            echo
            echo 'Available updates before applying changes:'
            echo
            echo '```text'
            printf '%s\n' "${REPORT}"
            echo '```'
          } > "${BODY_FILE}"

          # The branch is rebuilt from the target branch on every run, so a run
          # that drops an update leaves nothing stale behind.
          git switch -C "${BRANCH}"
          git add package.json pnpm-lock.yaml
          git commit -m "${TITLE}"
          git push --force origin "${BRANCH}"

          PR="$(gh pr list --head "${BRANCH}" --base "${TARGET_BRANCH}" --state open \
            --json number --jq '.[0].number // empty')"

          if [ -n "${PR}" ]; then
            gh pr edit "${PR}" --title "${TITLE}" --body-file "${BODY_FILE}"
          else
            gh pr create --base "${TARGET_BRANCH}" --head "${BRANCH}" \
              --title "${TITLE}" --body-file "${BODY_FILE}"
          fi
